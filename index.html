<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>T/O 현황 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      background: #f5f7fa;
      color: #111827;
      padding: 20px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .header {
      margin-bottom: 30px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      color: #6b7280;
      font-size: 13px;
    }
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: #6b7280;
    }
    .spinner {
      display: inline-block;
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 20px;
      color: #dc2626;
      text-align: center;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .kpi-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 4px;
      background: var(--accent, #2563eb);
    }
    .kpi-card .label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
      margin-bottom: 8px;
    }
    .kpi-card .value {
      font-size: 32px;
      font-weight: 700;
      color: #111827;
      line-height: 1.2;
    }
    .kpi-card .year {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 8px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }
    .card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #111827;
    }
    .chart-container {
      position: relative;
      height: 250px;
    }
    .table-wrap {
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table th, table td {
      padding: 12px;
      text-align: right;
      border-bottom: 1px solid #f3f4f6;
    }
    table th:first-child, table td:first-child {
      text-align: left;
    }
    table th {
      background: #f9fafb;
      font-weight: 600;
      color: #6b7280;
      font-size: 12px;
    }
    table tbody tr:hover { background: #f9fafb; }
    table .num { font-weight: 500; }
    table .highlight { color: #2563eb; font-weight: 600; }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 채용 T/O 현황 대시보드</h1>
      <p id="meta-info">데이터 로딩 중...</p>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>T/O 데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    const TO_CSV_URL = 'https://docs.google.com/spreadsheets/d/1YePcENf04K_zw-R7arARKUoU9JyL4LtOd0Tn4sDYiZU/export?format=csv&gid=61262713';
    let chart = null;

    // CSV 파싱
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') {
            if (line[i + 1] === '"') { current += '"'; i++; }
            else { inQuotes = false; }
          } else { current += ch; }
        } else {
          if (ch === ',') { result.push(current); current = ''; }
          else if (ch === '"' && current === '') { inQuotes = true; }
          else { current += ch; }
        }
      }
      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0);
      if (lines.length === 0) return { headers: [], rows: [] };
      const headers = parseCSVLine(lines[0]);
      const rows = lines.slice(1).map(parseCSVLine);
      return { headers, rows };
    }

    // 숫자 파싱
    function parseNum(s) {
      if (!s) return 0;
      const cleaned = String(s).replace(/[^\d.]/g, '');
      const n = parseFloat(cleaned);
      return isNaN(n) ? 0 : n;
    }

    function fmtNum(n) {
      return n.toLocaleString('ko-KR');
    }

    function fmtPct(num, den) {
      if (!den) return '0.0%';
      return ((num / den) * 100).toFixed(1) + '%';
    }

    // T/O 분석
    function analyzeTO(csv) {
      const { headers, rows } = parseCSV(csv);

      const idx = name => headers.indexOf(name);
      const cols = {
        position: idx('포지션'),
        requestDate: idx('채용요청시기'),
        to: idx('TO'),
        complete: idx('채용완료'),
        progress: idx('진행중'),
      };

      // 유효한 컬럼 확인
      if (cols.to < 0 || cols.complete < 0 || cols.progress < 0 || cols.requestDate < 0) {
        throw new Error('필수 컬럼을 찾을 수 없습니다: TO, 채용완료, 진행중, 채용요청시기');
      }

      // 연도별 집계
      const yearData = {
        2025: { total: 0, complete: 0, progress: 0 },
        2026: { total: 0, complete: 0, progress: 0 },
      };

      // 2026년 포지션별 데이터
      const positionData2026 = {};

      rows.forEach(row => {
        const requestDate = (row[cols.requestDate] || '').trim();
        const year = requestDate.substring(0, 4);
        const to = parseNum(row[cols.to]);
        const complete = parseNum(row[cols.complete]);
        const progress = parseNum(row[cols.progress]);

        if (year === '2025' || year === '2026') {
          if (yearData[year]) {
            yearData[year].total += to;
            yearData[year].complete += complete;
            yearData[year].progress += progress;
          }
        }

        // 2026년 포지션별
        if (year === '2026') {
          const pos = (row[cols.position] || '미상').trim();
          if (!positionData2026[pos]) {
            positionData2026[pos] = { total: 0, complete: 0, progress: 0 };
          }
          positionData2026[pos].total += to;
          positionData2026[pos].complete += complete;
          positionData2026[pos].progress += progress;
        }
      });

      // 남은 TO 계산 (공식: 총 TO - 채용완료 - 진행중)
      yearData[2025].remaining = yearData[2025].total - yearData[2025].complete - yearData[2025].progress;
      yearData[2026].remaining = yearData[2026].total - yearData[2026].complete - yearData[2026].progress;

      Object.keys(positionData2026).forEach(pos => {
        positionData2026[pos].remaining = positionData2026[pos].total - positionData2026[pos].complete - positionData2026[pos].progress;
      });

      return { yearData, positionData2026 };
    }

    // 렌더링
    function render(yearData, positionData2026) {
      // KPI 카드
      const kpiHtml = `
        <div class="kpi-grid">
          <div class="kpi-card" style="--accent: #2563eb;">
            <div class="label">2025년 총 TO</div>
            <div class="value">${fmtNum(yearData[2025].total)}</div>
            <div class="year">2025</div>
          </div>
          <div class="kpi-card" style="--accent: #10b981;">
            <div class="label">2025년 채용완료</div>
            <div class="value">${fmtNum(yearData[2025].complete)}</div>
            <div class="year">${fmtPct(yearData[2025].complete, yearData[2025].total)}</div>
          </div>
          <div class="kpi-card" style="--accent: #f59e0b;">
            <div class="label">2025년 남은 TO</div>
            <div class="value">${fmtNum(yearData[2025].remaining)}</div>
            <div class="year">미채용</div>
          </div>
          <div class="kpi-card" style="--accent: #06b6d4;">
            <div class="label">2026년 총 TO</div>
            <div class="value">${fmtNum(yearData[2026].total)}</div>
            <div class="year">2026</div>
          </div>
          <div class="kpi-card" style="--accent: #10b981;">
            <div class="label">2026년 채용완료</div>
            <div class="value">${fmtNum(yearData[2026].complete)}</div>
            <div class="year">${fmtPct(yearData[2026].complete, yearData[2026].total)}</div>
          </div>
          <div class="kpi-card" style="--accent: #f59e0b;">
            <div class="label">2026년 남은 TO</div>
            <div class="value">${fmtNum(yearData[2026].remaining)}</div>
            <div class="year">미채용</div>
          </div>
        </div>
      `;

      // 연도별 비교 차트
      const chartHtml = `
        <div class="grid">
          <div class="card">
            <h2>연도별 T/O 비교</h2>
            <div class="chart-container">
              <canvas id="year-chart"></canvas>
            </div>
          </div>

          <div class="card">
            <h2>2026년 포지션별 현황</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>포지션</th>
                    <th>총 TO</th>
                    <th>채용완료</th>
                    <th>진행중</th>
                    <th>남은 TO</th>
                    <th>달성율</th>
                  </tr>
                </thead>
                <tbody>
                  ${Object.entries(positionData2026)
                    .sort((a, b) => b[1].total - a[1].total)
                    .map(([pos, data]) => `
                      <tr>
                        <td><strong>${pos}</strong></td>
                        <td class="num">${fmtNum(data.total)}</td>
                        <td class="num">${fmtNum(data.complete)}</td>
                        <td class="num">${fmtNum(data.progress)}</td>
                        <td class="num highlight">${fmtNum(data.remaining)}</td>
                        <td class="num">${fmtPct(data.complete, data.total)}</td>
                      </tr>
                    `).join('')}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      document.getElementById('content').innerHTML = kpiHtml + chartHtml;
      document.getElementById('meta-info').textContent = `최근 조회: ${new Date().toLocaleString('ko-KR')}`;

      // 차트 렌더링
      renderChart(yearData);
    }

    function renderChart(yearData) {
      if (chart) chart.destroy();

      const ctx = document.getElementById('year-chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['2025년', '2026년'],
          datasets: [
            {
              label: '총 TO',
              data: [yearData[2025].total, yearData[2026].total],
              backgroundColor: '#2563eb',
              borderRadius: 6,
            },
            {
              label: '채용완료',
              data: [yearData[2025].complete, yearData[2026].complete],
              backgroundColor: '#10b981',
              borderRadius: 6,
            },
            {
              label: '진행중',
              data: [yearData[2025].progress, yearData[2026].progress],
              backgroundColor: '#f59e0b',
              borderRadius: 6,
            },
            {
              label: '남은 TO',
              data: [yearData[2025].remaining, yearData[2026].remaining],
              backgroundColor: '#ef4444',
              borderRadius: 6,
            },
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top' },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)}`
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#f3f4f6' }
            },
            x: { grid: { display: false } }
          }
        }
      });
    }

    // 메인 로드
    async function load() {
      try {
        const response = await fetch(TO_CSV_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: CSV를 불러올 수 없습니다.`);
        }
        const csv = await response.text();

        if (!csv.includes('TO')) {
          throw new Error('CSV에 "TO" 컬럼을 찾을 수 없습니다.');
        }

        const { yearData, positionData2026 } = analyzeTO(csv);
        render(yearData, positionData2026);
      } catch (err) {
        console.error('[T/O 대시보드] 오류:', err);
        document.getElementById('content').innerHTML = `
          <div class="error-state">
            <strong>⚠️ 데이터를 불러올 수 없습니다</strong><br>
            <div style="margin-top:12px; font-size:13px;">${err.message}</div>
            <div style="margin-top:8px; font-size:12px; color:#a16207;">
              스프레드시트가 공개로 설정되어 있는지 확인하세요.
            </div>
          </div>
        `;
      }
    }

    load();
  </script>
</body>
</html>
