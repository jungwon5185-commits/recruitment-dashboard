<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채용 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js" integrity="sha384-iU8HYtnGQ8Cy4zl7gbNMOhsDTTKX02BTXptVP/vqAWIaTfM7isw76iyZCsjL2eVi" crossorigin="anonymous"></script>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", sans-serif;
      background: #f5f7fa;
      color: #111827;
      line-height: 1.5;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #111827;
    }
    .header .meta {
      font-size: 13px;
      color: #6b7280;
    }
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 8px 16px;
      border: 1px solid #d1d5db;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: #374151;
      transition: all 0.15s;
    }
    .filter-btn:hover {
      border-color: #9ca3af;
      background: #f9fafb;
    }
    .filter-btn.active {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
    }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: var(--accent, #2563eb);
    }
    .kpi-card .label {
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .kpi-card .value {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      line-height: 1.1;
    }
    .kpi-card .sub {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
    .kpi-card .sub strong {
      color: #f59e0b;
      font-weight: 600;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
      gap: 16px;
      margin-bottom: 16px;
    }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
    }
    .card h2 {
      font-size: 15px;
      font-weight: 600;
      color: #111827;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card h2 .badge {
      font-size: 11px;
      font-weight: 500;
      color: #6b7280;
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 999px;
    }
    .chart-container {
      position: relative;
      height: 280px;
    }
    .chart-container.tall { height: 340px; }
    .funnel-bars { display: flex; flex-direction: column; gap: 10px; }
    .funnel-row { display: flex; align-items: center; gap: 12px; }
    .funnel-label {
      width: 100px;
      font-size: 13px;
      color: #374151;
      font-weight: 500;
    }
    .funnel-bar-wrap {
      flex: 1;
      background: #f3f4f6;
      border-radius: 6px;
      height: 32px;
      position: relative;
      overflow: hidden;
    }
    .funnel-bar {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #2563eb);
      border-radius: 6px;
      display: flex;
      align-items: center;
      padding-left: 10px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      min-width: 40px;
      transition: width 0.4s ease;
    }
    .funnel-meta {
      width: 90px;
      text-align: right;
      font-size: 12px;
      color: #6b7280;
    }
    .funnel-meta strong { color: #f59e0b; }
    .loading, .error-state {
      text-align: center;
      padding: 80px 20px;
      color: #6b7280;
    }
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-state { color: #dc2626; }
    .table-wrap { overflow-x: auto; }
    table.pos-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    table.pos-table th, table.pos-table td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid #f3f4f6;
    }
    table.pos-table th:first-child, table.pos-table td:first-child {
      text-align: left;
    }
    table.pos-table th {
      background: #f9fafb;
      font-weight: 600;
      color: #6b7280;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    table.pos-table tbody tr:hover { background: #f9fafb; }
    table.pos-table .num { font-variant-numeric: tabular-nums; font-weight: 500; }
    table.pos-table .pct { color: #2563eb; font-weight: 600; }
    .full-width { grid-column: 1 / -1; }
    .ip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 12px;
    }
    .ip-bucket {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
    }
    .ip-header {
      padding: 10px 14px;
      border-left: 4px solid #2563eb;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 13px;
    }
    .ip-count {
      font-size: 12px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
    }
    .ip-list {
      max-height: 280px;
      overflow-y: auto;
    }
    .ip-row {
      padding: 8px 14px;
      border-top: 1px solid #f3f4f6;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 12px;
    }
    .ip-row:first-child { border-top: 0; }
    .ip-id {
      font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
      font-weight: 600;
      color: #111827;
      flex-shrink: 0;
    }
    .ip-tags {
      display: inline-flex;
      gap: 4px;
      flex-wrap: wrap;
    }
    .ip-tag {
      font-size: 11px;
      background: #f3f4f6;
      color: #4b5563;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .ip-status {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
    }
    .csv-upload {
      margin-bottom: 20px;
      padding: 16px;
      background: #f0f9ff;
      border: 1px solid #0ea5e9;
      border-radius: 8px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .csv-upload label {
      font-size: 13px;
      color: #0c4a6e;
      font-weight: 500;
    }
    .csv-upload input[type="file"] {
      display: none;
    }
    .csv-upload button {
      padding: 6px 14px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
    }
    .csv-upload button:hover {
      background: #0284c7;
    }
    /* T/O 테이블 스타일 */
    .to-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      background: #fff;
    }
    .to-table th {
      background: #f3f4f6;
      font-weight: 600;
      color: #6b7280;
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .to-table td {
      padding: 10px 12px;
      border-bottom: 1px solid #f3f4f6;
      text-align: left;
    }
    .to-table td.num {
      text-align: center;
      font-weight: 600;
    }
    .to-table td.highlight {
      color: #2563eb;
      font-weight: 600;
    }
    .to-table tbody tr:hover {
      background: #f9fafb;
    }
    .year-kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .year-kpi-card {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }
    .year-kpi-card .year {
      font-size: 11px;
      color: #6b7280;
      font-weight: 500;
      margin-bottom: 4px;
    }
    .year-kpi-card .label {
      font-size: 11px;
      color: #6b7280;
      margin-bottom: 4px;
    }
    .year-kpi-card .value {
      font-size: 22px;
      font-weight: 700;
      color: #111827;
    }
    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      .funnel-label { width: 70px; font-size: 12px; }
      .funnel-meta { width: 70px; font-size: 11px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 채용 대시보드</h1>
      <div class="meta" id="meta-info">데이터 로딩 중...</div>
    </div>

    <div class="csv-upload" id="upload-section" style="display:none;">
      <label for="csv-input">📁 CSV 파일 업로드:</label>
      <input type="file" id="csv-input" accept=".csv" />
      <button onclick="document.getElementById('csv-input').click()">파일 선택</button>
    </div>

    <!-- T/O 대시보드 섹션 -->
    <div class="card" style="margin-bottom:20px;">
      <h2>📊 채용 T/O 현황
        <span class="badge">연도별 비교 및 2026년 상세 정보</span>
      </h2>

      <!-- 2026년 채용현황 + 연도별 비교 (한 줄) -->
      <div style="margin-bottom: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start;">
        <!-- 좌측: 2026년 KPI -->
        <div>
          <h3 style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #374151;">2026년 채용 현황</h3>
          <div class="year-kpi-grid" id="year-2026-kpi" style="grid-template-columns: repeat(2, 1fr);">
            <div class="year-kpi-card">
              <div class="label">총 TO</div>
              <div class="value" id="to-2026-total">-</div>
            </div>
            <div class="year-kpi-card">
              <div class="label">채용완료</div>
              <div class="value" id="to-2026-complete">-</div>
            </div>
            <div class="year-kpi-card">
              <div class="label">진행중</div>
              <div class="value" id="to-2026-progress">-</div>
            </div>
            <div class="year-kpi-card">
              <div class="label">남은 TO</div>
              <div class="value" id="to-2026-remaining">-</div>
            </div>
          </div>
        </div>

        <!-- 우측: 연도별 비교 차트 -->
        <div>
          <h3 style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #374151;">연도별 비교</h3>
          <div style="position: relative; height: 200px;">
            <canvas id="year-comparison-chart"></canvas>
          </div>
        </div>
      </div>

      <!-- 2026년 포지션별 상세 정보 -->
      <div>
        <h3 style="font-size: 13px; font-weight: 600; margin-bottom: 12px; color: #374151;">2026년 포지션별 상세 정보</h3>
        <div class="table-wrap" style="max-height: 400px; overflow-y: auto;">
          <table class="to-table" id="to-2026-detail-table">
            <thead>
              <tr>
                <th>포지션</th>
                <th style="text-align: center;">총 TO</th>
                <th style="text-align: center;">채용완료</th>
                <th style="text-align: center;">진행중</th>
                <th style="text-align: center;">남은 TO</th>
                <th style="text-align: center;">달성율</th>
              </tr>
            </thead>
            <tbody id="to-2026-table-body">
              <tr><td colspan="6" style="text-align: center; color: #9ca3af;">데이터 로딩 중...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="content">
      <div class="loading">
        <div class="spinner"></div>
        <div>채용 데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>

  <script>
    let appData = null;
    let toData = null;
    let currentFilter = '전체';
    const charts = {};

    // CSV 파일 선택 핸들러
    document.getElementById('csv-input').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (evt) => {
        const csv = evt.target.result;
        loadAndRender(csv);
      };
      reader.readAsText(file, 'utf-8');
    });

    // -------- CSV parsing --------
    function parseCSVLine(line) {
      const result = [];
      let current = '';
      let inQuotes = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (inQuotes) {
          if (ch === '"') {
            if (line[i + 1] === '"') { current += '"'; i++; }
            else { inQuotes = false; }
          } else { current += ch; }
        } else {
          if (ch === ',') { result.push(current); current = ''; }
          else if (ch === '"' && current === '') { inQuotes = true; }
          else { current += ch; }
        }
      }
      result.push(current);
      return result;
    }

    function parseCSV(text) {
      const lines = text.split(/\r?\n/).filter(l => l.length > 0);
      if (lines.length === 0) return { headers: [], rows: [] };
      const headers = parseCSVLine(lines[0]);
      const rows = lines.slice(1).map(parseCSVLine);
      return { headers, rows };
    }

    function parseNum(s) {
      if (!s) return 0;
      const cleaned = String(s).replace(/[^\d.]/g, '');
      const n = parseFloat(cleaned);
      return isNaN(n) ? 0 : n;
    }

    function parseApplicantsCSV(csvText) {
      const { headers, rows } = parseCSV(csvText);
      if (!headers.includes('지원자 ID')) {
        throw new Error('CSV 헤더에 "지원자 ID" 컬럼을 찾을 수 없습니다.');
      }
      const idx = name => headers.indexOf(name);
      const cols = {
        type: idx('구분'),
        id: idx('지원자 ID'),
        source: idx('지원경로'),
        position: idx('포지션'),
        applyDate: idx('지원일자'),
        codingTest: idx('코딩테스트'),
        codingScore: idx('코딩테스트_점수'),
        codingResult: idx('코딩테스트_결과'),
        docReview: idx('서류전형'),
        interview: idx('면접전형'),
        interviewResult: idx('면접전형_결과'),
        hireDate: idx('입사일자'),
        rejectReason: idx('불합격 사유'),
      };
      const updateMark = headers.findIndex(h => h && h.includes('업데이트 일자'));
      const updateDate = updateMark >= 0 ? (headers[updateMark + 1] || '') : '';

      const applicants = rows
        .filter(r => r[cols.id] && r[cols.id].trim() !== '' && r[cols.type] && r[cols.type].trim() !== '')
        .map(r => {
          const o = {};
          for (const k in cols) {
            o[k] = (cols[k] >= 0 ? (r[cols[k]] || '') : '').trim();
          }
          return o;
        });
      return { applicants, updateDate };
    }

    const isDev = a => a.type === '개발';
    const isNonDev = a => a.type === '비개발';
    const hasVal = v => !!(v && v.trim() && v.trim() !== '-');

    function classify(a) {
      const dev = isDev(a);
      const nonDev = isNonDev(a);
      const hasReject = hasVal(a.rejectReason);

      const codingDone = dev && a.codingTest === 'O';
      const codingPassed = codingDone && a.codingResult === '합격';
      const codingFailed = codingDone && a.codingResult === '불합격';
      const codingInProgress = codingDone && !codingPassed && !codingFailed && !hasReject;

      const docDone = codingPassed || nonDev;
      const docPassed = docDone && a.docReview === '합격';
      const docFailed = docDone && a.docReview === '불합격';
      const docInProgress = docDone && !docPassed && !docFailed && !hasReject;

      const interviewDone = docPassed;
      const interviewPassed = interviewDone && a.interviewResult === '합격';
      const interviewFailed = interviewDone && a.interviewResult === '불합격';
      const interviewInProgress = interviewDone && !interviewPassed && !interviewFailed && !hasReject;

      const finalPassed = interviewPassed;
      const isHired = hasVal(a.hireDate);
      const awaitingHire = finalPassed && !isHired && !hasReject;

      return {
        codingDone, codingPassed, codingFailed, codingInProgress,
        docDone, docPassed, docFailed, docInProgress,
        interviewDone, interviewPassed, interviewFailed, interviewInProgress,
        finalPassed, isHired, awaitingHire,
      };
    }

    function annotate(applicants) {
      return applicants.map(a => ({ ...a, _c: classify(a) }));
    }

    function applyFilter(applicants, filter) {
      if (filter === '전체') return applicants;
      return applicants.filter(a => a.type === filter);
    }

    function computeFunnel(applicants) {
      const dev = applicants.filter(isDev);
      const nonDev = applicants.filter(isNonDev);
      const sum = (arr, key) => arr.reduce((s, a) => s + (a._c[key] ? 1 : 0), 0);

      return {
        total: applicants.length,
        codingDone: sum(dev, 'codingDone'),
        codingPassed: sum(dev, 'codingPassed'),
        codingFailed: sum(dev, 'codingFailed'),
        codingInProgress: sum(dev, 'codingInProgress'),
        docDone: sum(applicants, 'docDone'),
        docPassed: sum(applicants, 'docPassed'),
        docFailed: sum(applicants, 'docFailed'),
        docInProgress: sum(applicants, 'docInProgress'),
        interviewDone: sum(applicants, 'interviewDone'),
        interviewPassed: sum(applicants, 'interviewPassed'),
        interviewFailed: sum(applicants, 'interviewFailed'),
        interviewInProgress: sum(applicants, 'interviewInProgress'),
        finalPassed: sum(applicants, 'finalPassed'),
        hired: sum(applicants, 'isHired'),
        awaitingHire: sum(applicants, 'awaitingHire'),
        nonDevTotal: nonDev.length,
        devTotal: dev.length,
      };
    }

    function computeRejectReasons(applicants) {
      const map = new Map();
      applicants.forEach(a => {
        if (a.rejectReason && a.rejectReason.trim()) {
          const reason = a.rejectReason.trim();
          map.set(reason, (map.get(reason) || 0) + 1);
        }
      });
      return Array.from(map.entries()).sort((a, b) => b[1] - a[1]);
    }

    function computeSources(applicants) {
      const map = new Map();
      applicants.forEach(a => {
        const s = (a.source || '미상').trim() || '미상';
        map.set(s, (map.get(s) || 0) + 1);
      });
      return Array.from(map.entries()).sort((a, b) => b[1] - a[1]);
    }

    function computeInProgressByStage(applicants) {
      const buckets = {
        coding: [],
        doc: [],
        interview: [],
        awaiting: [],
      };
      applicants.forEach(a => {
        const c = a._c;
        const info = { id: a.id, type: a.type, source: a.source, position: a.position, applyDate: a.applyDate };
        if (c.codingInProgress) {
          buckets.coding.push({ ...info, detail: a.codingTest === '평가중' ? '평가중' : '결과 대기' });
        } else if (c.docInProgress) {
          buckets.doc.push({ ...info, detail: a.docReview === '평가중' ? '평가중' : '결과 대기' });
        } else if (c.interviewInProgress) {
          buckets.interview.push({ ...info, detail: a.interviewResult === '평가중' ? '평가중' : '결과 대기' });
        } else if (c.awaitingHire) {
          buckets.awaiting.push({ ...info, detail: '입사일 미정' });
        }
      });
      return buckets;
    }

    function computeSourceFunnels(applicants) {
      const map = new Map();
      applicants.forEach(a => {
        const s = (a.source || '미상').trim() || '미상';
        if (!map.has(s)) {
          map.set(s, {
            source: s,
            total: 0,
            devTotal: 0,
            codingDone: 0, codingPassed: 0,
            docDone: 0, docPassed: 0,
            interviewDone: 0, interviewPassed: 0,
            hired: 0,
            inProgress: 0,
          });
        }
        const row = map.get(s);
        const c = a._c;
        row.total++;
        if (isDev(a)) row.devTotal++;
        if (c.codingDone) row.codingDone++;
        if (c.codingPassed) row.codingPassed++;
        if (c.docDone) row.docDone++;
        if (c.docPassed) row.docPassed++;
        if (c.interviewDone) row.interviewDone++;
        if (c.interviewPassed) row.interviewPassed++;
        if (c.isHired) row.hired++;
        if (c.codingInProgress || c.docInProgress || c.interviewInProgress || c.awaitingHire) {
          row.inProgress++;
        }
      });
      return Array.from(map.values()).sort((a, b) => b.total - a.total);
    }

    function computePositions(applicants) {
      const map = new Map();
      applicants.forEach(a => {
        const p = (a.position || '미상').trim() || '미상';
        if (!map.has(p)) {
          map.set(p, {
            position: p,
            type: a.type || '',
            total: 0,
            codingDone: 0, codingPassed: 0,
            docDone: 0, docPassed: 0,
            interviewDone: 0, interviewPassed: 0,
            finalPassed: 0, hired: 0,
            inProgress: 0,
          });
        }
        const row = map.get(p);
        const c = a._c;
        row.total++;
        if (c.codingDone) row.codingDone++;
        if (c.codingPassed) row.codingPassed++;
        if (c.docDone) row.docDone++;
        if (c.docPassed) row.docPassed++;
        if (c.interviewDone) row.interviewDone++;
        if (c.interviewPassed) row.interviewPassed++;
        if (c.finalPassed) row.finalPassed++;
        if (c.isHired) row.hired++;
        if (c.codingInProgress || c.docInProgress || c.interviewInProgress || c.awaitingHire) {
          row.inProgress++;
        }
      });
      return Array.from(map.values()).sort((a, b) => b.total - a.total);
    }

    function fmtPct(num, den) {
      if (!den) return '0.0%';
      return ((num / den) * 100).toFixed(1) + '%';
    }
    function fmtNum(n) { return n.toLocaleString('ko-KR'); }

    function render() {
      const filteredRaw = applyFilter(appData.applicants, currentFilter);
      const filtered = annotate(filteredRaw);
      const f = computeFunnel(filtered);

      const rejectReasons = computeRejectReasons(filtered);
      const sources = computeSources(filtered);
      const positions = computePositions(filtered);
      const sourceFunnels = computeSourceFunnels(filtered);
      const inProgressBuckets = computeInProgressByStage(filtered);

      const totalInProgress = filtered.reduce((s, a) => {
        const c = a._c;
        return s + ((c.codingInProgress || c.docInProgress || c.interviewInProgress || c.awaitingHire) ? 1 : 0);
      }, 0);

      const showCoding = currentFilter !== '비개발';
      const kpis = [
        {
          label: '총 지원자', value: f.total, accent: '#2563eb',
          sub: `진행중 <strong>${fmtNum(totalInProgress)}명</strong>`
        },
        showCoding ? {
          label: '코딩테스트', value: f.codingDone, accent: '#0ea5e9',
          sub: `합격 ${fmtNum(f.codingPassed)} · 진행중 <strong>${fmtNum(f.codingInProgress)}</strong>`
        } : null,
        {
          label: '서류전형', value: f.docDone, accent: '#10b981',
          sub: `합격 ${fmtNum(f.docPassed)} · 진행중 <strong>${fmtNum(f.docInProgress)}</strong>`
        },
        {
          label: '면접전형', value: f.interviewDone, accent: '#f59e0b',
          sub: `합격 ${fmtNum(f.interviewPassed)} · 진행중 <strong>${fmtNum(f.interviewInProgress)}</strong>`
        },
        {
          label: '최종합격', value: f.finalPassed, accent: '#8b5cf6',
          sub: `입사 ${fmtNum(f.hired)} · 대기 <strong>${fmtNum(f.awaitingHire)}</strong>`
        },
        {
          label: '최종입사', value: f.hired, accent: '#ec4899',
          sub: '확정'
        },
      ].filter(Boolean);

      const kpiHtml = kpis.map(k => `
        <div class="kpi-card" style="--accent: ${k.accent}">
          <div class="label">${k.label}</div>
          <div class="value">${fmtNum(k.value)}</div>
          <div class="sub">${k.sub}</div>
        </div>
      `).join('');

      const funnelStages = showCoding
        ? [
            { label: '총 지원', value: f.total, prev: null },
            { label: '코딩테스트', value: f.codingDone, prev: f.total },
            { label: '서류전형', value: f.docDone, prev: f.codingDone },
            { label: '면접전형', value: f.interviewDone, prev: f.docDone },
            { label: '최종합격', value: f.finalPassed, prev: f.interviewDone },
            { label: '최종입사', value: f.hired, prev: f.finalPassed },
          ]
        : [
            { label: '총 지원', value: f.total, prev: null },
            { label: '서류전형', value: f.docDone, prev: f.total },
            { label: '면접전형', value: f.interviewDone, prev: f.docDone },
            { label: '최종합격', value: f.finalPassed, prev: f.interviewDone },
            { label: '최종입사', value: f.hired, prev: f.finalPassed },
          ];
      const maxVal = Math.max(...funnelStages.map(s => s.value), 1);
      const funnelHtml = funnelStages.map((s, i) => {
        const pct = (s.value / maxVal) * 100;
        const validConv = s.prev != null && s.prev >= s.value && s.prev > 0;
        const conv = validConv ? `<strong>${fmtPct(s.value, s.prev)}</strong>` : '–';
        return `
          <div class="funnel-row">
            <div class="funnel-label">${s.label}</div>
            <div class="funnel-bar-wrap">
              <div class="funnel-bar" style="width: ${Math.max(pct, 4)}%">${fmtNum(s.value)}</div>
            </div>
            <div class="funnel-meta">${conv}</div>
          </div>
        `;
      }).join('');

      function renderInProgressBucket(label, color, items) {
        const rows = items.length === 0
          ? `<div style="color:#9ca3af; font-size:13px; padding:12px;">진행중 인원 없음</div>`
          : items.map(it => `
              <div class="ip-row">
                <span class="ip-id">${it.id}</span>
                <span class="ip-tags">
                  <span class="ip-tag">${it.type || '-'}</span>
                  <span class="ip-tag">${it.position || '-'}</span>
                  <span class="ip-tag">${it.source || '-'}</span>
                </span>
                <span class="ip-status" style="color:${color}">${it.detail}</span>
              </div>
            `).join('');
        return `
          <div class="ip-bucket">
            <div class="ip-header" style="border-left-color:${color}">
              <strong>${label}</strong>
              <span class="ip-count" style="background:${color}1a; color:${color}">${fmtNum(items.length)}명</span>
            </div>
            <div class="ip-list">${rows}</div>
          </div>
        `;
      }

      const inProgressHtml = `
        ${renderInProgressBucket('코딩테스트 진행중', '#0ea5e9', inProgressBuckets.coding)}
        ${renderInProgressBucket('서류전형 진행중', '#10b981', inProgressBuckets.doc)}
        ${renderInProgressBucket('면접 진행중', '#f59e0b', inProgressBuckets.interview)}
        ${renderInProgressBucket('합격 → 입사 대기', '#8b5cf6', inProgressBuckets.awaiting)}
      `;

      const fmtFrac = (num, den) => den ? `${fmtNum(num)} <span style="color:#9ca3af;">(${fmtPct(num, den)})</span>` : '–';
      const srcRows = sourceFunnels.map(s => {
        const hasDev = s.devTotal > 0;
        return `
          <tr>
            <td><strong>${s.source}</strong></td>
            <td class="num">${fmtNum(s.total)}</td>
            <td class="num">${hasDev ? fmtFrac(s.codingPassed, s.codingDone) : '–'}</td>
            <td class="num">${fmtFrac(s.docPassed, s.docDone)}</td>
            <td class="num">${fmtFrac(s.interviewPassed, s.interviewDone)}</td>
            <td class="num">${fmtNum(s.hired)}</td>
            <td class="num" style="color:#f59e0b;">${fmtNum(s.inProgress)}</td>
            <td class="pct">${fmtPct(s.hired, s.total)}</td>
          </tr>
        `;
      }).join('');

      const posRows = positions.map(p => {
        const isDevPos = p.type === '개발';
        return `
          <tr>
            <td><strong>${p.position}</strong> <span style="color:#9ca3af; font-size:11px; margin-left:4px;">${p.type || ''}</span></td>
            <td class="num">${fmtNum(p.total)}</td>
            <td class="num">${isDevPos ? fmtNum(p.codingDone) : '–'}</td>
            <td class="num">${fmtNum(p.docDone)}</td>
            <td class="num">${fmtNum(p.interviewDone)}</td>
            <td class="num">${fmtNum(p.finalPassed)}</td>
            <td class="num">${fmtNum(p.hired)}</td>
            <td class="num" style="color:#f59e0b;">${fmtNum(p.inProgress)}</td>
            <td class="pct">${fmtPct(p.hired, p.total)}</td>
          </tr>
        `;
      }).join('');

      const sampleSize = filtered.length;
      const sourceNote = `📊 총 ${fmtNum(sampleSize)}건 기준`;

      document.getElementById('content').innerHTML = `
        <div class="filter-bar">
          <button class="filter-btn ${currentFilter === '전체' ? 'active' : ''}" data-filter="전체">전체</button>
          <button class="filter-btn ${currentFilter === '개발' ? 'active' : ''}" data-filter="개발">개발</button>
          <button class="filter-btn ${currentFilter === '비개발' ? 'active' : ''}" data-filter="비개발">비개발</button>
          <div style="margin-left:auto; align-self:center; font-size:12px; color:#6b7280;">${sourceNote}</div>
        </div>

        <div class="kpi-grid">${kpiHtml}</div>

        <div class="card" style="margin-bottom:16px;">
          <h2>각 퍼널 진행중 지원자 ID
            <span class="badge">전체 ${fmtNum(sampleSize)}건 · 평가중·결과 대기</span>
          </h2>
          <div class="ip-grid">${inProgressHtml}</div>
        </div>

        <div class="grid">
          <div class="card">
            <h2>채용 퍼널 <span class="badge">${currentFilter} · 단계 진입 인원</span></h2>
            <div class="funnel-bars">${funnelHtml}</div>
          </div>

          <div class="card">
            <h2>퍼널별 합격률 <span class="badge">단계 진입자 중 합격</span></h2>
            <div class="chart-container"><canvas id="conv-chart"></canvas></div>
          </div>

          <div class="card">
            <h2>불합격 사유 비율 <span class="badge">총 ${fmtNum(rejectReasons.reduce((s, [_, n]) => s + n, 0))}건</span></h2>
            <div class="chart-container tall"><canvas id="reject-chart"></canvas></div>
          </div>

          <div class="card">
            <h2>지원경로 비율 <span class="badge">${sources.length}개 채널</span></h2>
            <div class="chart-container tall"><canvas id="source-chart"></canvas></div>
          </div>

          <div class="card full-width">
            <h2>지원경로별 합격률 <span class="badge">${sourceFunnels.length}개 채널 · 전체 ${fmtNum(sampleSize)}건</span></h2>
            <div class="table-wrap">
              <table class="pos-table">
                <thead>
                  <tr>
                    <th>지원경로</th>
                    <th>총 지원</th>
                    <th>코테 합격<br><span style="font-weight:400; text-transform:none; letter-spacing:0; color:#9ca3af;">(인원·합격률)</span></th>
                    <th>서류 합격<br><span style="font-weight:400; text-transform:none; letter-spacing:0; color:#9ca3af;">(인원·합격률)</span></th>
                    <th>면접 합격<br><span style="font-weight:400; text-transform:none; letter-spacing:0; color:#9ca3af;">(인원·합격률)</span></th>
                    <th>입사</th>
                    <th>진행중</th>
                    <th>입사율</th>
                  </tr>
                </thead>
                <tbody>${srcRows}</tbody>
              </table>
            </div>
          </div>

          <div class="card full-width">
            <h2>포지션별 분석 <span class="badge">${positions.length}개 포지션</span></h2>
            <div class="table-wrap">
              <table class="pos-table">
                <thead>
                  <tr>
                    <th>포지션</th>
                    <th>총 지원</th>
                    <th>코딩테스트</th>
                    <th>서류전형</th>
                    <th>면접전형</th>
                    <th>최종합격</th>
                    <th>입사</th>
                    <th>진행중</th>
                    <th>입사율</th>
                  </tr>
                </thead>
                <tbody>${posRows}</tbody>
              </table>
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.filter;
          render();
        });
      });

      renderCharts(f, rejectReasons, sources);
    }

    function destroyCharts() {
      for (const k in charts) {
        if (charts[k]) { charts[k].destroy(); charts[k] = null; }
      }
    }

    function renderCharts(f, rejectReasons, sources) {
      destroyCharts();

      const showCoding = currentFilter !== '비개발';
      const convStages = [];

      if (showCoding) {
        convStages.push({
          label: '코딩테스트 합격률',
          num: f.codingPassed, den: f.codingDone,
          desc: '코테 진행자 중 합격'
        });
      }
      convStages.push({
        label: '서류전형 합격률',
        num: f.docPassed, den: f.docDone,
        desc: '서류 진입자 중 합격'
      });
      convStages.push({
        label: '면접 합격률',
        num: f.interviewPassed, den: f.interviewDone,
        desc: '면접 진행자 중 합격'
      });
      convStages.push({
        label: '입사율',
        num: f.hired, den: f.finalPassed,
        desc: '최종합격자 중 입사'
      });

      const convLabels = convStages.map(s => s.label);
      const convValues = convStages.map(s => s.den ? +(s.num / s.den * 100).toFixed(1) : 0);

      charts.conv = new Chart(document.getElementById('conv-chart'), {
        type: 'bar',
        data: {
          labels: convLabels,
          datasets: [{
            label: '합격률 (%)',
            data: convValues,
            backgroundColor: ['#0ea5e9', '#10b981', '#f59e0b', '#8b5cf6'],
            borderRadius: 6,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.parsed.y}%`,
                afterLabel: (ctx) => {
                  const s = convStages[ctx.dataIndex];
                  return `${s.desc}\n합격 ${fmtNum(s.num)} / 진행 ${fmtNum(s.den)}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: { callback: v => v + '%' },
              grid: { color: '#f3f4f6' }
            },
            x: { grid: { display: false } }
          }
        }
      });

      const rejectLabels = rejectReasons.map(([k]) => k);
      const rejectValues = rejectReasons.map(([_, v]) => v);
      const rejectColors = [
        '#ef4444', '#f97316', '#f59e0b', '#eab308', '#84cc16',
        '#10b981', '#14b8a6', '#06b6d4', '#0ea5e9', '#3b82f6',
        '#6366f1', '#8b5cf6', '#a855f7', '#d946ef', '#ec4899',
      ];
      charts.reject = new Chart(document.getElementById('reject-chart'), {
        type: 'doughnut',
        data: {
          labels: rejectLabels,
          datasets: [{
            data: rejectValues,
            backgroundColor: rejectLabels.map((_, i) => rejectColors[i % rejectColors.length]),
            borderColor: '#fff',
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'right',
              labels: { boxWidth: 12, font: { size: 11 } }
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const total = rejectValues.reduce((a, b) => a + b, 0);
                  const pct = total ? (ctx.parsed / total * 100).toFixed(1) : 0;
                  return ` ${ctx.label}: ${fmtNum(ctx.parsed)} (${pct}%)`;
                }
              }
            }
          }
        }
      });

      const sourceLabels = sources.map(([k]) => k);
      const sourceValues = sources.map(([_, v]) => v);
      const total = sourceValues.reduce((a, b) => a + b, 0);
      charts.source = new Chart(document.getElementById('source-chart'), {
        type: 'bar',
        data: {
          labels: sourceLabels,
          datasets: [{
            label: '지원자 수',
            data: sourceValues,
            backgroundColor: '#2563eb',
            borderRadius: 6,
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                afterLabel: (ctx) => {
                  return `비중 ${total ? (ctx.parsed.x / total * 100).toFixed(1) : 0}%`;
                }
              }
            }
          },
          scales: {
            x: { beginAtZero: true, grid: { color: '#f3f4f6' } },
            y: { grid: { display: false } }
          }
        }
      });
    }

    function showError(stage, err) {
      const msg = (err && (err.message || err.toString())) || '알 수 없는 오류';
      document.getElementById('content').innerHTML = `
        <div class="error-state">
          <strong>데이터 로드 실패</strong><br>
          <div style="margin-top:8px; font-size:13px;">단계: <code style="background:#fee2e2; padding:2px 6px; border-radius:4px;">${stage}</code></div>
          <div style="margin-top:6px; font-size:13px;">${msg}</div>
        </div>
      `;
      document.getElementById('upload-section').style.display = 'flex';
    }

    function loadAndRender(csvText) {
      let stage = 'CSV 파싱';
      try {
        const parsed = parseApplicantsCSV(csvText);
        if (!parsed.applicants.length) {
          throw new Error('지원자 행을 찾을 수 없습니다.');
        }
        appData = { ...parsed, summary: null };

        const updateLabel = parsed.updateDate ? ` · 시트 업데이트 ${parsed.updateDate}` : '';
        document.getElementById('meta-info').textContent =
          `총 ${fmtNum(parsed.applicants.length)}명${updateLabel} · 최근 조회 ${new Date().toLocaleString('ko-KR')}`;

        stage = '렌더링';
        render();
        document.getElementById('upload-section').style.display = 'none';
      } catch (err) {
        console.error('[채용 대시보드] 실패 단계:', stage, err);
        showError(stage, err);
      }
    }

    // ===== T/O 분석 함수 =====
    function analyzeTO() {
      if (!toData || !toData.headers) return;

      const idx = name => toData.headers.indexOf(name);
      const cols = {
        position: idx('포지션'),
        requestDate: idx('채용요청시기'),
        to: idx('TO'),
        complete: idx('채용완료'),
        progress: idx('진행중'),
        remaining: idx('남은TO'),
      };

      // 연도별 집계
      const yearData = {
        2025: { total: 0, complete: 0, progress: 0, remaining: 0 },
        2026: { total: 0, complete: 0, progress: 0, remaining: 0 },
      };

      // 2026년 포지션별 데이터
      const positionData2026 = {};

      toData.rows.forEach(row => {
        const requestDate = (row[cols.requestDate] || '').trim();
        const year = requestDate.substring(0, 4);
        const to = parseNum(row[cols.to]);
        const complete = parseNum(row[cols.complete]);
        const progress = parseNum(row[cols.progress]);
        const remaining = parseNum(row[cols.remaining]);

        if (year === '2025' || year === '2026') {
          if (yearData[year]) {
            yearData[year].total += to;
            yearData[year].complete += complete;
            yearData[year].progress += progress;
            yearData[year].remaining += remaining; 
          }
        }

        // 2026년 포지션별
        if (year === '2026') {
          const pos = (row[cols.position] || '미상').trim();
          if (!positionData2026[pos]) {
            positionData2026[pos] = { total: 0, complete: 0, progress: 0, remaining: 0 };
          }
          positionData2026[pos].total += to;
          positionData2026[pos].complete += complete;
          positionData2026[pos].progress += progress;
          positionData2026[pos].remaining += remaining;
        }
      });

      // KPI 카드 업데이트
      document.getElementById('to-2026-total').textContent = fmtNum(yearData[2026].total);
      document.getElementById('to-2026-complete').textContent = fmtNum(yearData[2026].complete);
      document.getElementById('to-2026-progress').textContent = fmtNum(yearData[2026].progress);
      document.getElementById('to-2026-remaining').textContent = fmtNum(yearData[2026].remaining);

      // 연도별 비교 차트
      renderYearComparisonChart(yearData);

      // 2026년 포지션별 테이블
      renderPosition2026Table(positionData2026);
    }

    function renderYearComparisonChart(yearData) {
      if (charts.yearComparison) charts.yearComparison.destroy();

      const canvas = document.getElementById('year-comparison-chart');
      if (!canvas) return;

      // 달성율 계산
      const achievement2025 = yearData[2025].total > 0 ? ((yearData[2025].complete / yearData[2025].total) * 100) : 0;
      const achievement2026 = yearData[2026].total > 0 ? ((yearData[2026].complete / yearData[2026].total) * 100) : 0;

      charts.yearComparison = new Chart(canvas, {
        type: 'bar',
        data: {
          labels: ['총 TO', '달성율(%)'],
          datasets: [
            {
              label: '2025년',
              data: [
                yearData[2025].total,
                achievement2025
              ],
              backgroundColor: '#d1d5db',
              borderRadius: 6,
            },
            {
              label: '2026년',
              data: [
                yearData[2026].total,
                achievement2026
              ],
              backgroundColor: '#2563eb',
              borderRadius: 6,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'top',
              labels: { boxWidth: 12, font: { size: 12 } }
            },
            tooltip: {
              callbacks: {
                label: (ctx) => {
                  const isAchievementRate = ctx.dataIndex === 1;
                  if (isAchievementRate) {
                    return `${ctx.dataset.label}: ${ctx.parsed.y.toFixed(1)}%`;
                  }
                  return `${ctx.dataset.label}: ${fmtNum(ctx.parsed.y)}`;
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              grid: { color: '#f3f4f6' }
            },
            x: { grid: { display: false } }
          }
        }
      });
    }

    function renderPosition2026Table(positionData) {
      const tbody = document.getElementById('to-2026-table-body');
      if (!tbody) return;

      let html = '';
      Object.entries(positionData).forEach(([pos, data]) => {
        const achievementRate = data.total > 0 ? ((data.complete / data.total) * 100).toFixed(1) : 0;
        html += `
          <tr>
            <td><strong>${pos}</strong></td>
            <td style="text-align: center; font-weight: 600;">${fmtNum(data.total)}</td>
            <td style="text-align: center; font-weight: 600;">${fmtNum(data.complete)}</td>
            <td style="text-align: center; font-weight: 600;">${fmtNum(data.progress)}</td>
            <td style="text-align: center; font-weight: 600;">${fmtNum(data.remaining)}</td>
            <td style="text-align: center;"><span style="color: #2563eb; font-weight: 600;">${achievementRate}%</span></td>
          </tr>
        `;
      });

      tbody.innerHTML = html;
    }

    // T/O 데이터 로드
    async function loadTOData() {
      try {
        console.log('📋 T/O 데이터 로드 시작...');
        // Google Sheets 공개 CSV URL - 사용자가 설정한 URL로 변경하세요
        const TO_CSV_URL = 'https://docs.google.com/spreadsheets/d/1YePcENf04K_zw-R7arARKUoU9JyL4LtOd0Tn4sDYiZU/export?format=csv&gid=61262713';

        let response = await fetch(TO_CSV_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const csvText = await response.text();
        console.log('✅ T/O 데이터 로드 성공');
        toData = parseCSV(csvText);
        analyzeTO();
      } catch (err) {
        console.warn('⚠️ T/O 데이터 로드 실패:', err.message);
      }
    }

    // 채용 데이터 자동 로드
    async function autoLoadCSV() {
      try {
        console.log('📋 채용 데이터 자동 로드 시작...');
        // Google Sheets 공개 CSV URL - 사용자가 설정한 URL로 변경하세요
        const RECRUITMENT_CSV_URL = 'https://docs.google.com/spreadsheets/d/1YePcENf04K_zw-R7arARKUoU9JyL4LtOd0Tn4sDYiZU/export?format=csv&gid=2089072919';

        let response = await fetch(RECRUITMENT_CSV_URL);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const csvText = await response.text();
        if (!csvText || csvText.trim().length === 0) {
          throw new Error('CSV 파일이 비어있습니다');
        }
        console.log('✅ 채용 데이터 로드 성공');
        loadAndRender(csvText);

        // T/O 데이터도 로드
        loadTOData();
      } catch (err) {
        console.warn('⚠️ 자동 로드 실패:', err.message);
        document.getElementById('upload-section').style.display = 'flex';
      }
    }

    // 페이지 로드 시 실행
    window.addEventListener('load', autoLoadCSV);
  </script>
</body>
